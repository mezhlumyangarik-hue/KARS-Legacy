{% extends 'layout.html' %}

{% block content %}
<div style="background: radial-gradient(circle at center, #141414 0%, #080808 100%); color: #fff; padding: 100px 20px; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; min-height: 80vh; display: flex; justify-content: center; align-items: center; box-sizing: border-box;">
    
    <div style="background: linear-gradient(145deg, #181818, #101010); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 24px; width: 100%; max-width: 600px; padding: 60px 45px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05); box-sizing: border-box; position: relative; overflow: hidden;">
        
        <div style="position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #aa7c11, #d4af37, #f3e5ab, #d4af37, #aa7c11);"></div>
        
        <div class="success-icon-badge" style="font-size: 45px; color: #d4af37; margin: 0 auto 35px auto; background: radial-gradient(circle, rgba(212, 175, 55, 0.12) 0%, rgba(0,0,0,0) 70%); width: 110px; height: 110px; line-height: 110px; border-radius: 50%; border: 1px solid rgba(212, 175, 55, 0.3); display: block; box-shadow: 0 0 25px rgba(212, 175, 55, 0.1); position: relative; animation: pulseGold 2s infinite ease-in-out;">
            ✨
        </div>
        
        <h1 style="font-size: 32px; color: #ffffff; font-weight: 800; margin-top: 0; margin-bottom: 20px; line-height: 1.3; letter-spacing: 0.5px; text-transform: uppercase;">
            {{ title }}
        </h1>
        
        <div style="width: 60px; height: 1px; background: rgba(212, 175, 55, 0.3); margin: 0 auto 25px auto;"></div>
        
        <p style="color: #cccccc; font-size: 16px; line-height: 1.8; margin-top: 0; margin-bottom: 45px; font-weight: 400; letter-spacing: 0.3px; text-align: center; padding: 0 10px;">
            {{ text }}
        </p>
        
        <a href="/" class="luxury-btn" style="display: inline-block; background: linear-gradient(135deg, #d4af37 0%, #aa7c11 100%); color: #000000; padding: 16px 40px; font-size: 14px; font-weight: 700; text-decoration: none; border-radius: 8px; transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); text-transform: uppercase; letter-spacing: 1.5px; box-shadow: 0 6px 20px rgba(212, 175, 55, 0.25); border: 1px solid rgba(255,255,255,0.1); outline: none;">
            Գլխավոր Էջ ←
        </a>
        
    </div>
</div>

<style>
    @keyframes pulseGold {
        0% {
            transform: scale(1);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.15);
            border-color: rgba(212, 175, 55, 0.3);
        }
        50% {
            transform: scale(1.03);
            box-shadow: 0 0 35px rgba(212, 175, 55, 0.3);
            border-color: rgba(243, 229, 171, 0.6);
        }
        100% {
            transform: scale(1);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.15);
            border-color: rgba(212, 175, 55, 0.3);
        }
    }
    .luxury-btn:hover {
        background: #ffffff !important;
        color: #000000 !important;
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(255, 255, 255, 0.25) !important;
    }
    .luxury-btn:active {
        transform: translateY(-1px);
    }
</style>
{% endblock %}
